<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f3f1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141414" media="(prefers-color-scheme: dark)" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>网易云音乐</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <nav class="category-tabs" aria-label="媒体类型">
          <button type="button" data-category="album">专辑</button>
          <button type="button" data-category="playlist">歌单</button>
          <button type="button" data-category="podcast">播客</button>
        </nav>
        <button class="icon-button settings-button" type="button" id="open-settings" aria-label="打开设置" title="设置">⚙︎</button>
      </header>

      <main class="content" id="content">
        <section class="surface cover-surface" id="cover-surface" aria-label="封面浏览">
          <div class="cover-stage" id="cover-stage">
            <div class="coverflow" id="coverflow"></div>
            <div class="collection-copy" id="collection-copy" aria-live="polite"></div>
          </div>
          <div class="resource-state" id="library-state" aria-live="polite"></div>
        </section>

        <section class="surface track-surface" id="track-surface" aria-label="曲目列表" hidden>
          <header class="track-header">
            <button class="icon-button collapse-button" id="close-tracks" type="button" aria-label="返回封面" title="返回封面">⌄</button>
            <div class="track-heading">
              <h1 id="track-title">曲目</h1>
              <p id="track-subtitle"></p>
            </div>
          </header>
          <div class="track-scroll" id="track-scroll">
            <div id="track-list"></div>
          </div>
        </section>
      </main>

      <footer class="player" id="player">
        <div class="player-row">
          <div class="player-copy">
            <strong id="player-title">尚未播放</strong>
            <span id="player-artist">暂无曲目</span>
          </div>
          <button class="play-button" type="button" id="player-toggle" aria-label="播放" title="播放" disabled>▶︎</button>
        </div>
        <div class="progress-row">
          <span id="player-position">0:00</span>
          <input id="player-progress" type="range" min="0" max="1" step="1" value="0" aria-label="播放进度" disabled />
          <span id="player-duration">0:00</span>
        </div>
        <p class="player-error" id="player-error" role="alert" hidden></p>
      </footer>

      <div class="drawer-layer" id="drawer-layer" aria-hidden="true">
        <button class="drawer-backdrop" id="drawer-backdrop" type="button" aria-label="关闭设置"></button>
        <aside class="settings-drawer" role="dialog" aria-modal="true" aria-labelledby="settings-title">
          <header class="drawer-header">
            <h2 id="settings-title">设置</h2>
            <button class="icon-button" id="close-settings" type="button" aria-label="关闭设置" title="关闭">×</button>
          </header>
          <div id="auth-panel"></div>
        </aside>
      </div>

      <div class="notice" id="notice" role="status" hidden>
        <span id="notice-text"></span>
        <button type="button" id="close-notice" aria-label="关闭提示">×</button>
      </div>

      <audio id="audio" preload="metadata"></audio>
    </div>
  </body>
</html>
